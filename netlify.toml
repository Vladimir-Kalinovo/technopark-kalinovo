# Конфигурация Netlify для сайта «Технопарк Калиново».
# Деплой через подключённый GitHub-репозиторий: Netlify сам ставит зависимости
# (package.json) и собирает функции из netlify/functions.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Заголовки безопасности для всех страниц
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTML — без агрессивного кэша, чтобы правки появлялись сразу
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Фотографии — кэшируем надолго (они статичны)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
